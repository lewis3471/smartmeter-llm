# Optionale Ergänzungen für esp32-cam-electricity-meter.yaml
# (ESPHome Builder -> Bearbeiten -> einfügen -> Installieren)

# --- Chip-Temperatur (Wärme-Überwachung bei Dauer-LED im continuous-Modus) ---
# Misst den ESP32-Die, nicht die LED — auf dem kleinen Board aber ein
# brauchbarer Proxy. Taucht als Sensor in HA auf (Alert-Automation lohnt:
# z.B. Warnung > 75 °C).
sensor:
  - platform: internal_temperature
    name: "Chip Temperatur"
    update_interval: 60s

