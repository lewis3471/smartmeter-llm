name: Smartmeter LLM Nulleinspeisung
version: "1.7.3"
slug: smartmeter_llm
description: >-
  ESP32-Cam liest den Stromzähler (lokales OCR + Gemini-Fallback),
  regelt den Hoymiles-Inverter via OpenDTU auf Nulleinspeisung
url: https://github.com/lewis3471/smartmeter-llm
arch:
  - amd64
  - aarch64
init: false
startup: application
boot: auto
services:
  - mqtt:want
options:
  gemini_api_keys: ""
  gemini_models: gemini-flash-lite-latest,gemini-flash-latest,gemini-2.5-flash-lite,gemini-2.5-flash
  esphome_host: 192.168.178.58
  esphome_api_key: ""
  opendtu_url: http://192.168.178.42
  opendtu_user: admin
  opendtu_pass: ""
  inverter_serial: 1164a00ab8d4
  target_grid_w: -20
  deadband_w: 15
  latency_s: 0
  max_limit_w: 2000
  failsafe_limit_w: 51
  batt_strings: ""
  batt_low_v: 51.2
  batt_high_v: 54.4
  log_level: error
  save_samples: true
  git_sync_enabled: false
  git_repository: ""
  git_branch: main
  git_deploy_key_base64: ""
  git_sync_interval_s: 300
schema:
  gemini_api_keys: str
  gemini_models: str
  esphome_host: str
  esphome_api_key: str
  opendtu_url: str
  opendtu_user: str
  opendtu_pass: password
  inverter_serial: str
  target_grid_w: int(-800,1000)
  deadband_w: int(0,500)
  latency_s: float(0,60)
  max_limit_w: int(50,2000)
  failsafe_limit_w: int(0,2000)
  batt_strings: str
  batt_low_v: float(10,60)
  batt_high_v: float(10,60)
  log_level: list(all|error|none)
  save_samples: bool
  git_sync_enabled: bool
  git_repository: str
  git_branch: str
  git_deploy_key_base64: password
  git_sync_interval_s: int(10,3600)
